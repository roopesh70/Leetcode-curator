name: LeetCode Curator

on:
  schedule:
    # 3-4 days per week. GitHub Actions runs in UTC.
    - cron: "30 3 * * 1,3,5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run send
        env:
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

      - name: Commit progress
        run: |
          git config user.name "leetcode-curator-bot"
          git config user.email "leetcode-curator-bot@users.noreply.github.com"
          git add data/progress.json
          git diff --cached --quiet || git commit -m "Update LeetCode curator progress"
          git push
